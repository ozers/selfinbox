<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>Selfinbox — Self-hosted custom-domain email on AWS SES</title>
    <meta
      name="description"
      content="Open-source self-hosted email by Ozer Subasi. Run your own custom-domain inbox on AWS in an afternoon. Web inbox, per-domain SMTP, automatic DKIM/SPF/DMARC. MIT."
    />
    <meta name="author" content="Ozer Subasi" />
    <link rel="author" href="https://ozersubasi.com" />
    <link rel="canonical" href="https://selfinbox.ozersubasi.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://selfinbox.ozersubasi.com/" />
    <meta property="og:title" content="Selfinbox — Self-hosted custom-domain email on AWS SES" />
    <meta
      property="og:description"
      content="Open-source self-hosted email by Ozer Subasi. Run your own custom-domain inbox on AWS in an afternoon. MIT licensed."
    />
    <meta property="og:site_name" content="Selfinbox" />
    <meta property="article:author" content="Ozer Subasi" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Selfinbox — Self-hosted custom-domain email on AWS SES" />
    <meta
      name="twitter:description"
      content="Open-source self-hosted email by Ozer Subasi. Run your own custom-domain inbox on AWS in an afternoon. MIT licensed."
    />

    <!-- JSON-LD structured data: project + author -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Selfinbox",
        "description": "Self-hosted custom-domain email service running on AWS SES. Open-source, MIT licensed.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Cross-platform",
        "url": "https://selfinbox.ozersubasi.com/",
        "license": "https://opensource.org/licenses/MIT",
        "codeRepository": "https://github.com/ozers/selfinbox",
        "author": {
          "@type": "Person",
          "name": "Ozer Subasi",
          "url": "https://ozersubasi.com"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>

    <!-- Theme color (browser chrome) -->
    <meta name="theme-color" content="#0b0f1a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
